name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (allowed to fail temporarily)
        run: npm run check --if-present || echo "Type check failed, but proceeding anyway"

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_OAUTH_BACKEND_BASE: ${{ vars.VITE_OAUTH_BACKEND_BASE }}
        run: npm run build

      - name: Upload production build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/public
          if-no-files-found: error

  docker:
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'https://api.infraudit.com' }}
            VITE_OAUTH_BACKEND_BASE=${{ vars.VITE_OAUTH_BACKEND_BASE || 'https://api.infraudit.com' }}
          tags: ghcr.io/${{ github.repository_owner }}/infraaudit-frontend:latest,ghcr.io/${{ github.repository_owner }}/infraaudit-frontend:${{ github.sha }}

      - name: Update GitOps manifests
        run: |
          sed -i 's|tag: ".*"|tag: "${{ github.sha }}"|' deploy/charts/infraudit-frontend/values.yaml
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add deploy/charts/infraudit-frontend/values.yaml
          git commit -m "chore(gitops): update frontend image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push origin main 