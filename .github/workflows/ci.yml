name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'Dockerfile'
      - 'deploy/charts/infraudit-frontend/**'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/infraaudit-frontend

jobs:
  # ─── Build & Type Check ───────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check --if-present

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.infraudit.com' }}
          VITE_OAUTH_BACKEND_BASE: ${{ vars.VITE_OAUTH_BACKEND_BASE || 'https://api.infraudit.com' }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/public
          if-no-files-found: error

  # ─── Build & Push Docker Image ────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'https://api.infraudit.com' }}
            VITE_OAUTH_BACKEND_BASE=${{ vars.VITE_OAUTH_BACKEND_BASE || 'https://api.infraudit.com' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Update GitOps (trigger ArgoCD) ───────────
  update-gitops:
    name: Update GitOps Image Tag
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo $GITHUB_SHA | head -c 7)" >> $GITHUB_OUTPUT

      - name: Update frontend Helm values with new image tag
        run: |
          sed -i "s|tag: \".*\"|tag: \"${{ steps.sha.outputs.short }}\"|" \
            deploy/charts/infraudit-frontend/values-production.yaml

      - name: Commit and push updated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/charts/infraudit-frontend/values-production.yaml
          git diff --staged --quiet || git commit -m "chore(deploy): update frontend image to ${{ steps.sha.outputs.short }} [skip ci]"
          git push